cases:
  - name: launch_risk_disclaimer
    prompt: >
      Draft three launch readiness bullets for a crypto cross-sectional factor
      with Sharpe 1.4 that uses a current top-volume universe. The bullets must
      cover survivorship risk, point-in-time data limitations, and a user-facing
      statement that research outputs are not investment advice.
    required_findings:
      - survivorship
      - not investment advice
      - point-in-time
