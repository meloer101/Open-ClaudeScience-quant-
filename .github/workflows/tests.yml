name: tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run full test suite
        run: uv run pytest -q

      - name: Golden run discipline (GAP 5.1 regression lock)
        run: uv run pytest tests/test_golden_run_discipline.py -v
