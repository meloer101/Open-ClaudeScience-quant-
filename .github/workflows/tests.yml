name: tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run full test suite
        run: uv run pytest -q

      - name: Golden run discipline (GAP 5.1 regression lock)
        run: uv run pytest tests/test_golden_run_discipline.py -v

      - name: Wheel smoke
        run: |
          uv run python -m build
          uv run python -m pip install --force-reinstall dist/*.whl
          uv run quantbench --help

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: uv sync
        working-directory: .
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
