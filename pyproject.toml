[project]
name = "quantbench"
version = "0.1.0"
description = "Phase 0 CLI prototype for reproducible quantitative research runs."
requires-python = ">=3.10"
dependencies = [
  "click",
  "duckdb",
  "fastapi",
  "litellm",
  "lxml",
  "matplotlib",
  "numpy",
  "pandas",
  "pyarrow",
  "pyyaml",
  "requests",
  "scipy",
  "uvicorn",
  "yfinance",
]

[project.optional-dependencies]
live = ["ccxt"]

[tool.pytest.ini_options]
testpaths = ["tests"]
